name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: ./AplicacionMobil_IOS
        run: mvn clean package -Dmaven.test.skip=true

      - name: Stop Backend Before Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
              sudo systemctl stop backend.service
              echo "⏹ Backend detenido para reemplazo del JAR"

      - name: Copy JAR to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./AplicacionMobil_IOS/target/*.jar"
          target: "/home/azureuser/"
          strip_components: 2

      - name: Start Backend Service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
              sudo systemctl start backend.service
              echo "✅ Backend reiniciado con el nuevo JAR"

  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Angular actual exige al menos Node 20.19

      - name: Install Dependencies
        working-directory: ./asistencia_front
        run: npm ci || npm install # Instala con seguridad

      - name: Build Angular App
        working-directory: ./asistencia_front
        run: npm run build

      - name: Clean old frontend files
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
              rm -rf /home/azureuser/angular-app/*
              echo "Archivos viejos eliminados."

      - name: Copy DIST to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./asistencia_front/dist/*"
          target: "/home/azureuser/angular-app/"
          strip_components: 4 # Quita ./asistencia_front/dist/asistencia_front/browser/

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
              sudo systemctl reload nginx
              echo "✅ Frontend desplegado y Nginx recargado."
