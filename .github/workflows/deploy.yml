name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: ./AplicacionMobil_IOS
        run: mvn clean package -Dmaven.test.skip=true

      - name: Copy JAR to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./AplicacionMobil_IOS/target/*.jar"
          target: "/home/azureuser/"
          strip_components: 2 # Quita la estructura ./AplicacionMobil_IOS/target/ y solo deja el archivo jar

      - name: Restart Backend Service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
              sudo systemctl restart backend.service
              echo "✅ El Backend se ha reiniciado correctamente como un servicio de sistema"

  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Angular actual exige al menos Node 20.19

      - name: Install Dependencies
        working-directory: ./asistencia_front
        run: npm ci || npm install # Instala con seguridad

      - name: Build Angular App
        working-directory: ./asistencia_front
        run: npm run build

      - name: Copy DIST to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./asistencia_front/dist/*"
          target: "/home/azureuser/angular-app/"
          strip_components: 2 # Quita ./asistencia_front/dist/ y deja sus archivos internos

      - name: Restart Web Server (Si es necesario)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
              # Opcional: Reiniciar el servidor de Nginx si consideras que hace falta.
              # sudo systemctl restart nginx
              echo "Frontend copiado correctamente."
