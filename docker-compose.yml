version: '3.8'

services:
  # Backend: Spring Boot Application
  backend:
    build: ./AplicacionMobil_IOS
    container_name: backend_asistencia
    ports:
      - "8080:8080"
    environment:
      # Conecta al MySQL de tu Mac usando la IP especial de Docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/asistencia_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Joseangel1.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Frontend: Angular Application
  frontend:
    build: ./asistencia_front
    container_name: frontend_asistencia
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
